<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Choice Quiz - Dictionary Website</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inclusive-sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .quiz-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question {
            font-size: 20px;
            font-weight: 500;
            margin: 20px 0;
            color: #333;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0;
        }

        .option {
            padding: 15px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 16px;
        }

        .option:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.correct {
            border-color: #28a745;
            background: #d4edda;
            color: #155724;
        }

        .option.incorrect {
            border-color: #dc3545;
            background: #f8d7da;
            color: #721c24;
        }

        .option:disabled {
            cursor: not-allowed;
        }

        .next-btn {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .next-btn:hover:not(:disabled) {
            background: #5568d3;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <img src="../images/logo.png" alt="Logo">
        <a href="../index.html">Home</a>
        <a href="dictionary.html">Dictionary</a>
        <a href="quiz.html" class="active">Practice</a>
        <a href="about.html">About</a>
    </nav>

    <div class="quiz-container">
        <div class="question-number">Question 1 of 20</div>
        <p class="question">Loading question...</p>
        <div class="options"></div>
        <button class="next-btn" disabled>Submit Answer</button>
    </div>

    <script src="../js/mcq.js"></script>
</body>
</html>
